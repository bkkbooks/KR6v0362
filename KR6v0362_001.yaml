body:
  text: 金剛乘弟子慧空鍾伯毅謹篡顯明大密妙義深道六法引導廣論吉祥大師造金剛上師貢噶法獅子傳授金剛上師法賢講授原論編次一所依本質性理二修持道次第理甲加行子思維無常丑發菩薩心寅獻曼達卯念金剛心辰上師相應法乙正行子道根本忿怒母丑道所依幻化身寅道暖量修夢卯道心要光明辰道迎接中有巳道中心得決定生西前四法修未持令持已持令固已固令增保持覺受顯相功德後二法建立死中等理辨別與正修中有能生西正修生西生西利益丙歸結保守修持方法三所得果總義一六法忿怒母幻身夢光明為根本中有生西為支分二六法總體光明道六法亦互攝互融顯現光明三六法別體甲忿怒母拙火修持氣脈明點打通中脈升降四喜四空漸達光明三摩地乙幻身以夢幻泡影觀想幻成本尊身顯現自性光明丙修夢依習氣修夢身夢境轉成本尊身與剎土成眠空光明丁光明方便滅除粗細塵境顯現本具明體由覺受眠薄眠重三種修持通達光明戊中有了解理光明識持死光明己生西所有利益脫五濁世現清淨身但有上中下之差別果而上根補特迦羅即是死光明證理光明四忿怒母幻身晝修夢光明夜修中有生西臨終主修五根道果身本性質如所住之脈所動之氣所含之菩提甘露等心本性質如八識粗分顯現根識與末那識細分八十妄念極細分顯增得等所稱之根滙歸於道即生或中證佛陀淨果六六成就偈總示法身報身化身及體性身之會合與成就修此甚深引導法不可以少得為足應披鎧甲盡形壽毋或趨入世八法六法均須氣攝持尤以證拙火為要醒修拙火與幻身則見修與貪會合眠時修夢與光明則善業與痴會合依中有幻身口授則覺受與瞋會合此為根本三會合三又分三身會合氣收中脈生喜空定光明或俱生智是為法身之會合光明起心氣幻身是為報身之會合將粗質趨入中脈變成依正報壇城是為化身之會合此為醒時三會合認識眠時之四空於眠重光明入定是為法身之會合從彼起如幻之身是為報身之會合夢中變化諸境界顯依正二報壇城是為化身之會合此為眠時三會合死時能認識四空竭力定於死光明是為法身之會合從彼起中有幻身是為報身之會合從饒益眾生受生或清淨剎土受生是為化身之會合此為死時三會合總須令行持增長由拙火教授入道灌頂以至二穩固將一切緣會歸道初生有漏之覺受得下等煖資糧道次趨中脈生四喜淨分由中脈下降通達空樂之俱生得中等暖加行道復上提四喜明點淨分提至頂穩住解脫脈結三十二依次以至十二地初地時得無漏諦得上等暖見道位至十一地功德勝輙趨入於修道位後極細氣脈明點亦清淨盡而離障淨平常身成虹光三十二脈降菩提即成就三十二相清淨八十分別處即成就八十種好心氣為智慧所顯因即成就光明身阿杭雙運到究竟成雙抱圓滿報身得十三金剛持地即身現證無學位此中悲心與離戲虛空性無分猶如虛空不動者為法身由大樂顯境現相好莊嚴者為報身隨機應化現種種身廣作饒益眾生事業者為化身此三身無漏界上無分別者為體性身盡輪𢌞際此四身不動如如長住七六法各有口授七字偈是簡練每法之精要確示修持之最利導引錄於各義每法之首各義一忿怒母口授偈由持靈力於靈穴初則熱法得發生次則經驗於安樂後則心得自在境如是妄念自休止烟霧幻城陽燄等乃至如初發曙光無雲晴空次第現漸得神牛降聖乳四喜四空證淨果忿怒母拙火為命根亦為道種養此拙火鼓此拙火即所以摧燒煩惱而長養命根顯現菩提而紹隆道種其何以徵取母性蓋其具足生養成就諸德而發揮以淫欲而正性命之正義故允為六法之根本法甲修身應依毗盧遮那七支坐為基本輔以各種拳法一目了然法六事體功法觀想以變化其形體動作以靈活其氣脉最為利於取習乙修脈全身七萬二千脈特重中左右三脈而中脈尤居主要細分別頂輪三十二脈亦稱大樂輪喉輪十六脈亦稱報輪心輪八脈亦稱法輪臍輪六十四脈亦稱化輪又密護樂輪在海底三十二脈寶輪男寶珠頭女蓮宮口八脈又印堂風輪六脈即佛之神明眼火輪三脈在喉輪心輪之間通常用四輪亦有用五輪七輪者中脈從身之中央得名不在前簡別任脈不在後簡別督脈不在左與右簡別左右脈不在左右之中間簡別脊柱不在前後之中間簡別黃道乃在前後左右之中央蓋以其為無為法故而無造作此堅固不變之中央應進而認為任運在虛空之中央任運在法界之中央然本法標明中左右三脈並列且左右脈在下端屈入中脈則中脈似仍有為法或須經過猛力修持可昇華為無為法依據陳健民上師中黃督脊辨而贅以鄙見觀自身為本尊現一切脈絡如臍輪為化身心輪為法身喉輪為報身並識持萬脈為氣與明點之孔道中脈尤居要道無為法之中脈更為妙道故運用氣功以通脈使業刼氣變為智慧氣運用明點以活脈使濁物為甘露不可徒執修脈而修脈耳丙修氣修氣以寶瓶氣為主要有所謂吸滿消放射四法而持氣嫻熟時間下等三十六次中等七十二次上等一百零八次所指次者二手隨一拍二膝與額三處重在養之持之迫入中脈金剛誦要入氣住氣出氣三者有節奏而使身口意三業轉成法身報身化身明由氣生成為明空不二氣化暖量成為樂空不二進為心氣合一丁修明點明從五智來點從五大來約分四種物質明點即一般人之精蟲咒明點即種子字風明點即咒鬟旋轉若灌頂論之紅白菩提就是智慧明點之類初就物質明點𡢃習降提持散勻固六樣工夫漸次由頂輪而喉輪而心輪而臍輪通達四喜四空成就所謂智慧明點其下降明點由頂而喉而心而臍者為資糧加行世間道逆提明點由臍而心而喉而頂乃達華藏世界為出世道就物質明點修成智慧明點要發生安樂經過妙喜勝喜離喜俱生喜之四喜必喜而覺方是樂空不二要濁分盡變淨分如經過空極空大空一切空之四空必空其所明方是明空不二以四大六塵之昏濁身如何痛下工夫成就虹光雙融身妙用全在明點然明點罪福皆由於汝一般戒漏世智戒貪慎之二幻身口授偈身依毗盧七支坐喉觀上師金剛持不淨幻身身口意如幻八法次第修修淨幻身本尊觀先觀對生後自生剎那不隨緣遷動十二幻喻細觀察器為宮殿情眷屬由一顯多多攝一收放趨入於光明即生或中證殊勝甲修幻是極其以幻修幻之能事幻身約分三種一曰共義幻身就凡夫身口意三業如幻修持二曰別義幻身修持本尊身如幻三曰密中密義幻身入光明後起心氣所成之如幻本尊乙總觀山河大地器世間及人畜情世間分觀根識所現之色聲香味觸諸法皆無有實成與自性如十二幻喻幻人水月色影陽燄夢乾闥婆谷響雲虹霓電漚鏡影一一審諦益信有徵丙修不淨身是謂凡夫之身口意三業如幻修持首作身影觀其所現色影乃由淨鏡與人之中間毫無覆障因緣會合而生彼鏡中為美為惡作冷作煖皆影所幻故知幻即離能斷身業次以語作谷響觀其厓凹與自聲因緣會合而生彼聲音為靜為躁作毀作譽皆響所幻故知幻即離能斷口業復次以意作陽燄觀其草上如水覓不可得返觀自心迷亂與遷流猶如陽燄如勘破無體即明即空一切所顯亦即空顯尚何意業之可言哉丁修本尊淨幻身先觀對生本尊乃以善畫本尊安現鏡中另置一鏡影相亦現其中必分觀總觀了了知明然後修自生本尊觀自身即本尊無二無別戊堅固與增長均指幻力而言初則觀本尊大而充滿世界小而攝為芥子進而觀器世界及根識所現之山舍等變為越量宮殿觀情世界及根識與心所現一切變為本尊眷屬其最殊勝則觀色相即本尊聲音即咒音妄念即法性己假想如幻不過世間成就必以空見攝持而修方能通達實際如幻能觀本尊體性亦無有自性乃是現空無分庚最要在入光明道起如幻身其修法不外持氣後滅二種靜慮法及多持瓶氣使入定出定於光明之上其器世間化光入情世間有情化光入自己自己化光入吽字吽字化光入那打而已辛修此如幻三摩地為淨除一切執着迷妄而通達諸法本來實際即實相然實相非他乃攝盡輪𢌞涅槃一切本具如幻之自性附二靜慮法一持氣靜慮法觀本尊身及吽字專緣吽字隨力持瓶氣後如鏡中呼氣觀身上下一切皆收吽字吽字又收於那打那打無緣心專緣於此多持瓶氣入定二後滅靜慮法與上修持同其不同者器世間化光入有情世間有情化光入自己自己化入吽吽化光那打如是入定三修夢口授偈斷除不能持夢因喉觀上師祈加被四瓣蓮花中白入住出三金剛誦緣隨力持瓶氣趨入中脈生四空修持化變增三力最後修持本尊觀了知一切為心現究竟證如幻報身甲夢為十二幻喻之一種何以繼幻身而特列一法盖以夢為八識所現所謂夢裏明明有六趣醒來空空無大千具有特徵且夢為知量謂知佛之量得不退轉乙持夢一在不夢令其能夢二感分散令其恒固三斷惡夢之恐怖勘善夢為假相而增長夢化力謂自身化成器情世界種種奇異增長夢變力謂將己化之器情變境變量乃至不可測度丙一般必從眠時修夢若醒時及一切座中正行持之則心氣更易攝集喉中其正持有五要一曰時要黎明而飢飽適中二曰身要枕高如獅臥或屈足相架靠背三曰欲要於夢中能識為夢作想七次或二十一次四曰境要謂明緣喉蓮五字中嗡白前阿藍後打紅右魯黃左惹綠底皆白右旋依次緣餘字眠時專緣紅嗡字五曰氣要隨力持瓶氣其對治持夢分散及他過患觀自身住於白紅二明點間及觀喉蓮中嗡字變成五智體之藍吽字持氣而睡最為有效丁修夢利益為中有現證幻身之方便亦即證如幻本尊身之方便先須導入善業謂欲認識眠空修持氣後滅二靜慮法起心氣所成之本尊如幻身入定出定於光明之上使器界變成越量宮有情變成眷屬五欲變成妙供進而移遷上界謂觀自成本尊如幻身無論器情何處直往直返猶如電飛箭尤其中修清淨剎土毗盧遮那之奧明天或東方不動之現喜南方寶生之具德西方阿彌之極樂北方不空成就之鼓音其觀自所住處即所欲往之住處四光明口授偈光明分為根道果根者超乎一切法道分醒夢中陰修日中道行淨光者修習六不見子光前滅後未修母光合即正智淨光明夜間道行淨光者先求諸上師加被嗣猛厲行認證等醒境方終未睡前集中兩者能知力觀諸一切融入心心間五葉五真言或用返觀禪定法或用全輪空觀法甫行入睡所顯光即為本有之母光一心專注見子光二者和合即淨光甲光明為六法本體亦係通義何又列光明一法盖重在識持種種光明之性質與使用故不妨先抉因緣謂斷除不持眠光明因須修能持眠光明緣如何徵起眼識發生有限之光明進而提示醒時眠時融成一片如何攝氣入心漸歸中脈依次顯現四空發生無量光明而要使六法各各如量運用無碍乙正持光明約有五要一曰時要黎明而薄眠二曰身要高枕作獅子臥狀至眠將睞經屈足架坐三曰境要觀自成本尊如幻身心輪中現蓮花及五字依次而緣四曰氣要隨力持瓶氣五曰欲要想於眠之現增得圓滿後仍當識持光明欲想二十一次丙所謂眠光明乃已持令固起大精進之境界其由日修三摩地覺受相續眠中每每光滿身或光滿室故下者於夢未現時能領受澄湛之心明如見燈光此為覺受光明中者能滅除眠重識持心性明空尚現粗細塵境此為薄光明上者能依次了知現增近得光明四種並能滅除粗細塵境識持無顯現而離認識之心猶如晴空無雲此為真正眠光明丁最勝眠重光明次則眠薄光明又次覺受光明若其進度可由覺受增長而累進眠薄再累進眠重增長覺受光明者觀身內中脈如水晶柱心際現蓮花花中現白吽字放光滿全身或滿修室乃至照澈寺宇及地界醒時亦如此以此嚴持身心相緣入定使一切明顯了知若眠薄光明者觀心吽字放光徧滿身之內外以此入定而眠當能了知眠空之一分二分爾時更以空明之心性專緣心輪吽字保持明體使所現光明穩固雖未能滅盡所現粗細塵境而薄光漸近重光矣若眠重光明者謂醒時氣入中脈生四空或四喜由光明上或俱生智而定其識持之法後眠不來時心專緣心蓮之阿字爾時心稍攝氣四大依次收入則煙現陽焰等細相後眠將來時心緣嚕字爾時攝氣稍重識收於現則滅除粗境分別此名空又名現如晴空無雲現月光狀後近眠時心緣打字爾時攝氣更重現收於增則滅除一切細境分別名極空又名增如晴空無雲現日光狀後極近眠時心緣惹字爾時攝一切氣增收於近得則滅除大半細分別名大空又名近得如晴空無雲現黃昏徧滿狀後入眠睡心緣吽字爾時收一切氣近得收入光明則滅除一切分別名一切空或名光明如黎明時虛空離一切雲暗現極明湛狀要之應於光明三摩地上竭力習定而已戊光明分根道果三種其稱根光明者謂實際光明眠光明死光明等是無論修否知否決定顯現以發於根故稱道光明者謂一切法無生即空性此通義光明醒深眠死三時由氣收攝中脈生四空覺受此密義光明如無雲晴光現極細之如幻以法爾無分別智證空性故此究竟光明上述三者皆屬道光明乃親證雙融無學光明之果光明也惟眠光明更分眠中現善業者為共同光明依次識持四空者為非同光明此中無有所現而識持者為眠重光明現粗細塵境而識持者為眠薄光明又此二者之中若通達心性無生空性者為通達光明若決定了知領受者為覺受光明總之依光明口授次第猛修使子母光明合成一大光明藏證得圓滿法身為最殊勝五中有口授偈一切所顯皆中有受生乃至未死間由死至未受生間死生中三會歸道生修光明與夢幻中修拙火幻化身死依中有之口授第一證入法性身第二證入淨報身第三證入勝化身甲中有之廣義詮定由受生乃至未死間名生死中有醒時宜修生起圓滿次第並忿怒母與幻身口授眠時乃至未醒時名夢中有宜修光明與修夢口授由死乃至未受生時名正式中有應修中有口授乃與醒時宜修忿怒母與幻身眠時宜修夢與光明其趨道雖不同實皆正式中有之加行若欲了知中有之何以為中有惟有將中有前之死理中有後之受生理連帶扶出其理遂顯乙中有為死後之階段故須先明死理以覘中有之構成並如何趨善避惡而受生釋其死理初則收滅粗質二十種次則收滅內大種細質若干種附表進而收滅極細質現增得之理所謂識入於現如無雲晴空現月光狀現收入增無雲晴空現晨曦狀增收入得如傍晚晴空黃昏狀馴致漸失知覺至於無知而境界消失轉顯日月及黃昏三染緣之黎明狀此為死光明死光明不易體會然必須細細體會而利於方便運用丙何以現中有理謂由光明上依次顯現得增現復由光明上氣稍動時現得於光明消失現得時成中有同時於中有剎那現增於增剎那生現由此現生八十分別顯現中有之一切假現塵境形成此中有眾生者具足受生之隨類身形諸根皆備且有業力神變能現各趣形狀附表若其壽量則七日或二七日乃至四十九日內決定受生丁受生大抵分化濕卵胎四類不外各從其愛染而受生最顯著之人必於受生之父母起貪瞋心男胎對母起貪對父起瞋女胎對父起貪對母起瞋善趣如生天則見天女生愛染等等惡趣如傍生則恐怖往避崖蓬處而投生等等附表乃於中有受生時滅除中有時分自然發動之氣剎那剎那顯其現增得光明之當然程序亦可謂於此光明上由得現增由增生現從此生八十迷亂分別即貪瞋癡細質是若由顯住於氣言則生識所依之風界而火界而水界而地界從此大種增長五蘊則凡身於胎中圓滿長成矣戊中有修持之果有上根中根下根補特迦羅之差別若上根謂死時先滅二十粗質與內五種應觀情器世間皆為壇城隨修二靜慮法收攝瑜伽定於明體上繼減極細質之顯增得觀想滅此相生彼相定於明體上便能由死光明生理光明進而證無學雙融身其異熟身之所縛習氣境之所縛識心之所縛一時俱解獲至心即法界身為淨剎無疑矣若中根謂知死時諸相應修攝收瑜伽及光明定但感死光明未能生理光明則不能起幻化身惟仍依二靜處法攝於光明入定或發念生奧明天或密行殊勝身等道緣總使具足正知正念此生得證佛位若下根謂持中有幻境感於死不能入理與光明合中有不能入理與幻身合惟有初於諸死相顯時應知此即滅粗細質等相死光明顯時即持光明入定中有顯時即持中有而修口訣如是極厲欲想即於此善因上而逝因而識得此中有身無碍雖歷險地聞惡聲如火燒水溺墮厓及羅叉閻羅諸可怖畏均屬虛妄而無實體轉契無生大手印見而匯歸於道更有遮門選胎兩法為下根救濟設想者所謂遮止胎門觀本尊身器則越量宮有情皆眷屬一切如幻如化明示以無可貪瞋之處所而貿然投生所謂選胎受生謂猛想往生奧明天等淨土或行密行及利眾生之持明期於避惡趨善而已綜合上中下根之成就死有證法身中有證報身受生得化身為其主要功德矣附表一收滅粗質表蘊別衰狀收入四智色蘊身弱容損心昧地界身枯眼不明大圓鏡智受蘊受領鈍減水界唾汗均乾耳不聰平等性智想蘊不識一切有情火界飲食不化鼻失嗅妙觀察智行蘊不能行事氣界十氣各返自處舌不知味成所作智附表二收滅內大種細質表內大種外相內相地收入水身難支持識如縷烟水收入火唾涎枯焦識如陽燄滅除由瞋性所起三十三分別火收入風煖由手足攝識如螢光滅除由貪性所起四十分別氣收入識外息長不知攝內亦粗短心如燈光不被風動滅除由癡性所起七分別附記內相顯滅時不僅滅除八十分別且現增得亦滅地入水如陽燄水入火如烟大威德講義具此說附表三中有趣生現色行動表趣別現色行動惡趣黑色景物頭觸地善趣夜月光明頭平行地獄木塊燒焦頭觸地餓鬼烟色頭觸地傍生水色頭平行欲界天人金色頭向上人平行色界天人白色頭向上附表四中有趣生處所表善惡趣愛染及避生處所生天顯越量宮及見天子天女生愛染修羅適意林園非天男女生愛染東身勝洲牝牡馬群在洲邊生愛染南贍部洲男女群在華屋或美郊生愛染西牛賀洲牛群在草地生愛染北俱盧洲雌雄鵝群在池邊生愛染旁生崖洞蓬蒿往避餓鬼散髮如蓬舍往避地獄見鐵屋往避六生西口授偈命人中脈見陽燄貪熾念起次見烟相似交合見螢火飛舞明滅光不定如豆火燄堅不搖宛如佛前琉璃燈後心明朗如秋天萬里無雲清明潔八十種風始融入然後上升頂門出身高一尺能化身四出利生即此身又先作彼壺式風息三七反著力提識種經脊蓮上行於三七靈輪一一輪提升上升復下降相應誦真言此所誦真言有全半兩言誦真言之聲令著力高響導能知識種趣入淨樂界正是時一至轉識頓成就甲所稱生西補特迦羅者上根中根二種與持中有補特迦羅上中相同謂死有定於光明及中有起幻身為上根生西若中根則僅由幻身生西若下根須修生起次第往生彼最下根亦須明了因果而於本口授生決定信心乙能修往生事業者上根須持寶瓶氣一百零八息中根七十二息下根三十六息均以手拍二膝及額三轉鳴指一次為量無論上中下根嫺熟瓶氣而修正行時須修不共同諸加行觀上師住頂而自身為本尊相其中脈上端直達梵穴因慮識由各竅而出附表故須將輪迴八門一概遮閉並加蓋覆而觀法有多種最詳如觀對面空中上師與本尊不二如幻身想返觀自身三脈會合處現紅色阿洗心際現藍色吽字放五色光最初持瓶氣即於一度氣中將下氣上提並猛念二十一度黑噶復念七次黑噶時想阿洗直衝梵穴將封蓋穴處字融化出於頂面念最末次黑噶想吽如矢上升直入本尊心中即定此善因上後向內吸氣以一度氣念二十一次噶黑將上氣向下壓想吽字由虛空中本尊心出入自梵穴依次下降自己心際從彼吽字分一阿洗依次下降於三脈會合處若簡化或念阿黑或念噶黑或竟念阿念噶均無不可惟念黑噶向上升念噶黑向下壓此二者應於一度氣中猛聲念畢向上升時氣持於外將下氣向上提向下降時氣持於內將上氣向下壓每座時猛向內吸三五次心專緣三脈會合處阿洗每日若能修四座則現決定往生之相如輕安肉髻種種既得此相每月修三次或一次即可但須恆日發想往生奧明天等淨土為要丙正修往生事業謂死相俱全修假死法未能挽回益知死期漸近應修往生法但非時而行反成弒殺本尊之罪又不可不慎其觀察死相附表若知之果確應起作如下之修持一將自己一切資具供獻並斷除眷屬承受二猛將三昧耶戒懺悔而防守之三以所繪本尊相設於面前盡力修相應法供獻本尊護法食子祈禱往生四斷除貪瞋惡相五心緣奧明天或密行持明淨土數數生起欲念及至最近死相現時均與平日修往生法同其不同者惟觀中脈上端與梵穴瑩澈廣大毫無遮蓋後緣氣脈種子字唸二十一黑字想由梵穴如箭星直入本尊心中爾時如景象黑漆氣不攝內稍加休息如前唸二十一黑字而往生設猶不能由念廿二至廿五黑字時決定往生入於本尊心中本尊等亦如箭星直入隨所欲往清淨剎土佛陀之心中或攝於光明上持念而定丁更有嚴持身儀兩法亦可酌用所謂嚴持方便有嚴切決定之意其法殷請上師本尊用一肘之木身倚其上收提下氣以左足跟抵肛門以左足踝或右足跟抵密處並以二小指遮口無名指遮鼻二中指及二食指遮二目二大指遮二耳後觀面前虛空中本尊及觀自身本尊如幻身身之八竅以各種字蓋之及觀二脈種子字唸噶黑廿一反所謂身儀有對境返省之意其法視死期到時以佛像列前修供而誦皈依懺罪及發菩提心等於眷屬承受資具不起貪着身如獅子臥狀頭向北右脇臥地右手仰置右面下左手伸直左腿上左脚置右脚上二踝骨相叠足脛伸而微曲即猛起欲生淨土或持明處修往生法於頂上幻想本尊以己心專緣其心並一度猛念廿一反自能往生若得上師或助伴引導使之具足決定往生景象尤佳戊生西利益約分三類上根補特迦羅乃死光明證理光明中有起如幻身即證雙運身中根補特迦羅但識死光明而入定於中有顯現時能出定觀本尊如幻身圓滿一切道地資糧生所欲往生剎土依此生剎土身而得佛位下根補特迦羅依生起次第而修往生利益此中又分上中下三者上根生淨土或持明空行等處道業特增能得佛位中根能生修持密道種性中受生幾處上得成佛下根能解脫死之痛苦及中有怖畏得善道生與道相遇依次當得清淨解脫附表五識出各竅生處及蓋字表各竅往生處蓋覆字別梵穴持明空行紅色窮眉際色界黑色吽眼人道黑色吽耳似人道修羅綠色恰那勇鼻夜叉綠色恰那勇口餓鬼白色聳臍欲界天人紅色恰那勇密處小便旁生畜生黃色聳大便處地獄紅色窮附記或謂一切字皆觀白色或各竅均以二吽字蓋之附表六行氣失覺判定死期表行氣期失覺狀死期單右鼻行氣一晝夜三年零一月半五十十五二十廿五晝夜三年二年一年六月三月二十六日至一年間二月一月半月五日三日單左鼻行氣一晝夜三年零一月半三晝夜二年半六九十二十五十八廿一廿四廿七卅晝夜廿七月廿四月廿月十八月十五月十二月九月六月三月耳失聽覺六日舌失味覺五日目失視覺四日鼻失嗅覺三日身失觸覺二日無精血一日綜論一本六法為密藏傳入中土大法之一種其以人之身與心極盡幻化之道緣闡明人本位之一切奧秘判別即生成佛之預測與決定二本六法統攝光明道而又特立光明一法蓋欲辨別光明若干種類一一加以識持俾於中有生西兩法嫺熟運用獲證淨果三第一法可稱六法命根既名忿怒母又奉亥母為本尊其義在重取母性以拙火起於人慾盛於母性故於生起處取象阿字此阿字乃不生之生惟有善於識持使怒發之火摧燒煩惱燃起智慧轉爾濁分化為淨分不難成就虹光雙融身其致力要在樂空不二明空不二惟樂而空乃可祛世俗之染墮惟明而空乃可增寂照無碍四定為一切修持之根本方法故本六法屢列定於光明上是無分生與死皆定在光明其成就通達於大定妙定而為覺行圓滿之一端亦即決定成佛之方便手法五道之會合種類頗多不外醒時眠時死時本具之活用貪瞋癡會為法身報身化身其根本三會合謂醒時修忿怒母與幻身則見修與貪會合眠時修夢與光明則善業與癡會合依中有與幻身則覺受與瞋會合推而廣之眠與法身會合夢與報身會合醒與化身會合死與法身會合中有與報身會合生西與化身會合此正六法綜合之建立應善尋其迹發覺俱生智應善通其義導入後得境六果位更分直超橫超本法列上中根補特迦羅是依此生或中有或後世或後幾世成就而分即舉精進上根為證仍以忿怒母火趨入中脉為昇華道種之開始再視氣脉暖明之長養四喜四空之運用而沿顯教術語如資糧道加行道見道位修道位以明進階之工夫不可假飾亦不易躐越終至獲登十三金剛持地趨入無學道成就體性身盡輪𢌞際四身不動當為此生淨果其他中根下根不免於亦漸亦頓願行者披堅甲進之不已七加行每日修一二次正行每日修四六次而修幻夢光明每座須以三分之一時間先修忿怒母中有可每日座餘修持生西則每月一次或三次溫習其他違緣治病保持亦各詳明舉出此皆迹軌也然不可玩忽亦不可執着並須諦審本義互義如何配合本身之年齡體健環境加以調劑俟嫺熟後乃時時醒時眠時處處安樂持之養成無修之修而密持菩提心為因大悲為根本以達方便為究竟之旨本六法所用之藏字一覽以供察校吉祥圓滿
