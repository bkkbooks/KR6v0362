front:
  text: 非受本法傳受者請毋翻閱序往歲陳圓白居士刪訂祝拔宗大手印人皆服其簡潔今鍾慧空居士纂要六法引導廣論人更佩其精到誠以論理之文宜詳紀實之文宜簡乃有益於學人之領悟與實踐也六法善巧殊勝為成佛要道詳釋根道果之忿怒幻化持夢光明中有生西各法俾知樂明無念根於氣脈明點蓋非忿怒不能生大煖非大煖不能得大樂非大樂不能得大空非大空不能顯光明得俱生智而瓶氣與金剛誦又為修持之基礎也屈文六阿闍黎發大悲願卜吉大溪開建密壇數傳大法六成就乃其一門下皆一時俊彥將來成就必多且大則紹隆佛種利益人天其功德可謂無量非僅上報師恩下度迷情實與開顯東山法門傳承金胎兩部之先哲同其宏偉慧空居士治學精嚴尤長鉤玄提要於聽講之餘參照廣論撮取精髓遂成法要余力慫印贈同道供其參研航海明燈陸行指碑以此喻之或亦近是也康藏學人非精通顯教不能承受密法故有終身不能得一法者自班禪大師東來謂中土機緣成熟任何大法皆可傳授如是得法益者甚眾吾輩逢此殊勝因緣得聞稀有無上之密法豈可不奮勇精修使即身悟證圓成種智耶辛丑夏趙恆惖序於臺北
